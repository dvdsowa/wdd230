            <!--The site name is the simply the name of the organizational site and your proposed domain for the site. Part of this process

            <section id="sitePurpose">
            <h1>Site Purpose: </h1>
            <!--The site purpose provides a statement about the purpose of the website drawing upon the client's functional specifications, 
                the industry, and any fictitious but viable goals that you deem to be reasonable for a local chamber of commerce site. You 
                can find many examples of chamber of commerce sites for towns, especially in the United States. The site purpose should 
                attempt to provide scope to the website in describing what services and information the site will provide. Typically, 
                students might leave this section lacking by not talking about perceived content objectives.-->
